# Warp settings.toml - managed by the warp-setup skill (the "visual setup").
# Ships verbatim from Rainier's live config EXCEPT default_tab_config_path, whose
# directory is a placeholder token (see the [general] line below); the installer
# replaces it with this machine's OS-correct tab_configs directory at apply time.
# Nothing sensitive lives here once tokenized (the Warp account email and command
# history live only in warp.sqlite, which this skill never reads or ships).
[appearance]

[appearance.themes]
system_theme = false
theme = "adeberry"

[appearance.vertical_tabs]
enabled = true

[appearance.text]
notebook_font_size = 14.0
font_size = 13.0

[appearance.window]
zoom_level = 125

[code]

[code.editor]
show_code_review_button = false
show_project_explorer = false
show_global_search = false

[warp_drive]
enabled = false

[agents]

[agents.third_party]
should_render_cli_agent_toolbar = false

[agents.warp_agent]
is_any_ai_enabled = false

[agents.warp_agent.other]
show_agent_notifications = true

[terminal]
osc52_clipboard_access = "write_only"

[general]
show_warning_before_quitting = false
default_session_mode = "tab_config"
default_tab_config_path = '{{TAB_CONFIG_DIR}}/claude.toml'
